name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dev tooling
        run: python -m pip install --upgrade pip ruff

      - name: Content-rule lint (no em-dashes, etc.)
        run: python lint_content.py

      - name: Ruff lint
        run: ruff check .

      - name: Unit tests
        run: python -m unittest discover -p "test_*.py" -v

      - name: Verify package builds and installs
        run: pip install .

      - name: Smoke test console script
        run: content-wiz --list

      - name: Install LLM provider extras
        run: pip install .[llm]

      - name: Verify provider SDKs import (catches EOL/breaking SDK changes)
        run: python -c "import anthropic, google.genai, openai"
